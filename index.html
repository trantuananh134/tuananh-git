  <script>
    var fanpage = 'FM2VN';
    var group = 'fm2vn';
    var BASE_URL = 'https://dhtt.zoneplay.vn';

    //  onclick="opend_box('.box_gift','.gift')"

    function getFanpageLink() {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      if (/windows phone/i.test(userAgent)) {
        window.location.replace('https://www.facebook.com/' + fanpage);
      } else if (/android/i.test(userAgent)) {
        window.location.replace('fb://page/' + fanpage);
      } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.replace('fb://profile/' + fanpage);
      } else {
        window.open('https://www.facebook.com/' + fanpage, '_blank');
      }
    }

    function getGroupLink() {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      if (/windows phone/i.test(userAgent)) {
        window.location.replace('https://www.facebook.com/groups/' + group);
      } else if (/android/i.test(userAgent)) {
        window.location.replace('fb://group/' + group);
      } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.replace('fb://profile/' + group);
      } else {
        window.open('https://www.facebook.com/groups/' + group, '_blank');
      }
    }
  </script>
